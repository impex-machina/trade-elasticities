name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  testthat:
    runs-on: ubuntu-latest
    env:
      # renv restores into the project library; GitHub Actions has no
      # interactive prompts.
      RENV_CONFIG_REPOS_OVERRIDE: https://cloud.r-project.org
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R 4.6.0
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libglpk-dev libgit2-dev
        shell: bash

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Show session info
        run: |
          Rscript -e 'sessionInfo()'
          Rscript -e 'cat("data.table:", as.character(packageVersion("data.table")), "\n"); cat("Rcpp:", as.character(packageVersion("Rcpp")), "\n")'
        shell: bash

      - name: Run testthat suite
        run: |
          Rscript -e 'testthat::test_dir("tests/testthat", stop_on_failure = TRUE)'
        shell: bash
